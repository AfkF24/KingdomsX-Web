server {
  listen 8080;
  server_name assets.kingdomsx.com;

  root /srv/kingdomsx/assets;
  error_page 403 /403.html;
  error_page 404 /404.html;

  location = /healthz {
    access_log off;
    default_type text/plain;
    return 200 "ok\n";
  }

  location ~ /\. { deny all; }

  location /build/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    add_header Access-Control-Allow-Origin "*" always;
    add_header X-Content-Type-Options nosniff always;
  }

  location / {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
    add_header Access-Control-Allow-Origin "*" always;
    add_header X-Content-Type-Options nosniff always;
  }

  location = /403.html {
    root /srv/kingdomsx/home;
    internal;
  }

  location = /404.html {
    root /srv/kingdomsx/home;
    internal;
  }
}
