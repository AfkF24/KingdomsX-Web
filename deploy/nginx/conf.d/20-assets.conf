server {
  listen 8080;
  server_name assets.kingdomsx.com;

  root /srv/kingdomsx/assets;

  location = /healthz {
    access_log off;
    default_type text/plain;
    return 200 "ok\n";
  }

  location ~ /\. { deny all; }

  location / {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
    add_header Access-Control-Allow-Origin "*" always;
    add_header X-Content-Type-Options nosniff always;
  }
}
