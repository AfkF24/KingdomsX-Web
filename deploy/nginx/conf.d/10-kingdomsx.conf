server {
  listen 8080;
  server_name kingdomsx.com;

  root /srv/kingdomsx/home;
  index index.html;
  error_page 403 /403.html;
  error_page 404 /404.html;

  location = /healthz {
    access_log off;
    default_type text/plain;
    return 200 "ok\n";
  }

  location ~ /\.(?!well-known) { deny all; }
  location ~ ^/discord/?$  { return 302 https://discord.kingdomsx.com/; }
  location ~ ^/wiki/?$     { return 302 https://wiki.kingdomsx.com/; }
  location ~ ^/download/?$ { return 302 https://www.spigotmc.org/resources/77670/; }
  if ($request_uri ~ ^/([^?]*)\.html(\?|$)) { return 301 /$1; }

  location ~* \.(?:css|js|png|webp|svg|ico|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
    add_header X-Content-Type-Options nosniff always;
    try_files $uri =404;
  }

  location /assets/ {
    alias /srv/kingdomsx/assets/;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
    add_header X-Content-Type-Options nosniff always;
    try_files $uri =404;
  }

  location /assets/build/ {
    alias /srv/kingdomsx/assets/build/;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    add_header X-Content-Type-Options nosniff always;
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri.html $uri/ =404;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
  }

  location = /403.html {
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
  }

  location = /404.html {
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
  }

}

server {
  listen 8080;
  server_name www.kingdomsx.com;
  return 301 https://kingdomsx.com$request_uri;
}
